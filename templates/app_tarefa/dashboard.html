<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Tarefas</th>
      <th scope="col">Descrição</th>
      <th scope="col">Data de vencimento</th>
      <th scope="col">Status</th>
      <th scope="col">Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for tarefa in tarefas %}
    <tr>
      <th scope="row">{{ tarefa.id }}</th>
      <td>{{ tarefa.titulo }}</td>
      <td>{{ tarefa.descricao }}</td>
      <td>{{ tarefa.data }}</td>
      <td>{% if tarefa.status %} Concluido {% else %} Pendente {% endif %}</td>
      <td>
        <a  class="btn btn-primary" href="{% url 'editar_tarefa' tarefa.id %}">Editar</a>
        <a class="btn btn-danger " href="{% url 'excluir_tarefa' tarefa.id %}">Excluir</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<a href="{% url 'create_novo' %}" class="btn btn-success">Criar Nova Tarefa</a>
</body>
</html>
